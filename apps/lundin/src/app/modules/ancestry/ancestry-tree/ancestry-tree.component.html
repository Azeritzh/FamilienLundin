<ng-container *ngIf="generations">
	<section class="tree-container">
		<header class="container-header">
			<h1>{{currentPerson.name}} - stamtræ</h1>
		</header>
		<div class="ancestry-tree">
			<div *ngFor="let generation of generations"
				class="generation">
				<div *ngFor="let person of generation"
					class="person">
					<span *ngIf="person"
						class="person-info">
						{{person.name}}
					</span>
				</div>
			</div>
		</div>
	</section>
</ng-container>
